server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.html;

    # 日志
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # CORS
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
    add_header Access-Control-Allow-Headers "Content-Type, X-API-Key";

    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # Homepage API v1 -> homepage_api.php
    location ~ ^/api/v1(/|$) {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/homepage_api.php;
        fastcgi_param SCRIPT_NAME     /homepage_api.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 30;
        include fastcgi_params;
    }

    # 协议文件 (md) 以文本类型返回
    location /Agreement/ {
        root /var/www/frontend;
        types { text/plain md; }
        default_type text/plain;
    }

    # 前端静态文件 (根路径直接指向 frontend)
    location / {
        root /var/www/frontend;
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|mp3|mp4)$ {
        root /var/www/frontend;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # 上传文件访问
    location /uploads/ {
        alias /var/www/backend/uploads/;
    }

    # 媒体文件访问
    location /uploads/media/ {
        alias /var/www/backend/uploads/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location ^~ /avatars/ {
        alias /var/www/backend/avatars/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 聊天室 - 同源 PHP-FPM 处理（不再用反向代理，彻底消除跨域）
    location ^~ /chat/ {
        root /var/www;
        index chat.php index.php;

        # 静态文件直接服务
        location ~* ^/chat/.+\.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|mp3|mp4|avi|pdf|zip|rar|7z)$ {
            root /var/www;
            expires 30d;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }

        # PHP 文件交给同一个 PHP-FPM
        location ~ \.php$ {
            fastcgi_pass app:9000;
            fastcgi_index chat.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT /var/www/chat;
            fastcgi_param SCRIPT_NAME $fastcgi_script_name;
            fastcgi_param REQUEST_URI $request_uri;
            include fastcgi_params;
            fastcgi_buffers 16 16k;
            fastcgi_buffer_size 32k;
            fastcgi_read_timeout 600;
        }

        # 上传/头像目录禁止执行脚本
        location ~* ^/chat/(uploads|avatars)/.*\.php$ {
            deny all;
            return 403;
        }

        # 禁止访问配置和密钥文件
        location ~* ^/chat/(config|keys)/ {
            deny all;
            return 403;
        }

        # 禁止访问敏感文件
        location ~* ^/chat/.*\.(sql|dump|bak|old|cache|tmp|env)$ {
            deny all;
            return 403;
        }

        try_files $uri $uri/ /chat/chat.php?$query_string;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    client_max_body_size 100M;
}
